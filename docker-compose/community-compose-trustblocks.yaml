services:
  alfresco:
    image: docker.io/alfresco/alfresco-content-repository-community:25.2.0
    mem_limit: 1900m
    environment:
      JAVA_TOOL_OPTIONS: -Dencryption.keystore.type=JCEKS -Dencryption.cipherAlgorithm=DESede/CBC/PKCS5Padding
        -Dencryption.keyAlgorithm=DESede -Dencryption.keystore.location=/usr/local/tomcat/shared/classes/alfresco/extension/keystore/keystore
        -Dmetadata-keystore.password=mp6yc0UD9e -Dmetadata-keystore.aliases=metadata
        -Dmetadata-keystore.metadata.password=oKIWzVdEdA -Dmetadata-keystore.metadata.algorithm=DESede
      JAVA_OPTS: -Ddb.driver=org.postgresql.Driver -Ddb.username=postgres -Ddb.password=devpassword123
        -Ddb.url=jdbc:postgresql://trust-server-postgres-local:5432/alfresco_dev -Dsolr.host=solr6
        -Dsolr.port=8983 -Dsolr.http.connection.timeout=1000 -Dsolr.secureComms=secret
        -Dsolr.sharedSecret=secret -Dsolr.base.url=/solr -Dindex.subsystem.name=solr6
        -Dshare.host=localhost -Dshare.port=8080 -Dalfresco.host=localhost -Dalfresco.port=8080
        -Dcsrf.filter.enabled=false -Daos.baseUrlOverwrite=http://localhost:8080/alfresco/aos
        -Dmessaging.broker.url="failover:(nio://activemq:61616)?timeout=3000&jms.useCompression=true"
        -Ddeployment.method=DOCKER_COMPOSE -DlocalTransform.core-aio.url=http://transform-core-aio:8090/
        -XX:MinRAMPercentage=50 -XX:MaxRAMPercentage=80
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/alfresco/api/-default-/public/alfresco/versions/1/probes/-ready-
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 1m
    volumes:
    - /usr/local/tomcat/alf_data
    extends:
      file: commons/base.yaml
      service: alfresco
    networks:
    - trust-network
  transform-core-aio:
    image: alfresco/alfresco-transform-core-aio:5.2.0
    mem_limit: 1536m
    environment:
      JAVA_OPTS: -XX:MinRAMPercentage=50 -XX:MaxRAMPercentage=80
    ports:
    - 8090:8090
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8090/ready
      interval: 20s
      timeout: 2s
      retries: 3
      start_period: 10s
    depends_on:
      activemq:
        condition: service_healthy
    networks:
    - trust-network
  share:
    image: docker.io/alfresco/alfresco-share:25.2.0
    mem_limit: 1g
    environment:
      CSRF_FILTER_ORIGIN: http://localhost:8080
      CSRF_FILTER_REFERER: http://localhost:8080/share/.*
      REPO_HOST: alfresco
      REPO_PORT: '8080'
      JAVA_OPTS: -XX:MinRAMPercentage=50 -XX:MaxRAMPercentage=80 -Dalfresco.host=localhost
        -Dalfresco.port=8080 -Dalfresco.context=alfresco -Dalfresco.protocol=http
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/share
      interval: 20s
      timeout: 2s
      retries: 3
      start_period: 15s
    depends_on:
      alfresco:
        condition: service_healthy
    extends:
      file: commons/base.yaml
      service: share
    networks:
    - trust-network
  solr6:
    image: docker.io/alfresco/alfresco-search-services:2.0.16
    mem_limit: 2g
    environment:
      SOLR_ALFRESCO_HOST: alfresco
      SOLR_ALFRESCO_PORT: '8080'
      SOLR_SOLR_HOST: solr6
      SOLR_SOLR_PORT: '8983'
      SOLR_CREATE_ALFRESCO_DEFAULTS: alfresco,archive
      ALFRESCO_SECURE_COMMS: secret
      JAVA_TOOL_OPTIONS: -Dalfresco.secureComms.secret=secret
    ports:
    - 8083:8983
    networks:
    - trust-network
  activemq:
    image: alfresco/alfresco-activemq:5.18-jre17-rockylinux8
    mem_limit: 1g
    ports:
    - 8161:8161
    - 5672:5672
    - 61616:61616
    - 61613:61613
    healthcheck:
      test:
      - CMD
      - /opt/activemq/bin/activemq
      - query
      - --objname
      - type=Broker,brokerName=*,service=Health
      - '|'
      - grep
      - Good
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
    - trust-network
  content-app:
    image: alfresco/alfresco-content-app:7.0.1
    mem_limit: 128m
    environment:
      APP_BASE_SHARE_URL: http://localhost:8080/aca/#/preview/s
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 1s
    extends:
      file: commons/base.yaml
      service: content-app
    networks:
    - trust-network
  control-center:
    image: quay.io/alfresco/alfresco-control-center:10.0.1
    mem_limit: 128m
    environment:
      APP_CONFIG_PROVIDER: ECM
      APP_CONFIG_AUTH_TYPE: BASIC
      BASE_PATH: ./
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 1s
    extends:
      file: commons/base.yaml
      service: control-center
    networks:
    - trust-network
  proxy:
    extends:
      file: commons/base.yaml
      service: proxy
    networks:
    - trust-network
networks:
  trust-network:
    external: true
    name: trust-network
